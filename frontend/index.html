<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <button type="button" id="cartBtn" class="cart-icon-btn" aria-label="Open cart">
      🛒
      <span id="cartCount" class="cart-badge hidden">0</span>
    </button>

    <p class="eyebrow">Inventory</p>
    <h1 class="headline">Poké<span class="accent">Shop</span></h1>

  </header>

  <main class="layout">

    <!-- ADD / EDIT CARD FORM -->
    <section class="panel form-panel" aria-labelledby="form-title">
      <h2 id="form-title" class="panel-title">Add a card</h2>
      <form id="cardForm" novalidate>
        <label class="field">
          <span>Name</span>
          <input type="text" name="name" placeholder="Pikachu" required />
        </label>

        <label class="field">
          <span>Type</span>
          <input type="text" name="type" placeholder="Electric" />
        </label>

        <label class="field">
          <span>Rarity</span>
          <input type="text" name="rarity" placeholder="Rare" />
        </label>

        <div class="field-row">
          <label class="field">
            <span>Price ($)</span>
            <input type="number" name="price" min="0" step="0.01" placeholder="0.00" />
          </label>

          <label class="field">
            <span>Stock</span>
            <input type="number" name="stock" min="0" step="1" placeholder="1" />
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn">Add card</button>
          <button type="button" id="cancelEditBtn" class="cancel-btn" hidden>Cancel</button>
        </div>
        <p id="formMessage" class="form-message" role="status"></p>
      </form>
    </section>

    <!-- CARD LIST -->
    <section class="panel list-panel" aria-labelledby="list-title">
      <h2 id="list-title" class="panel-title">Available cards</h2>
      <p id="listMessage" class="form-message" role="status"></p>
      <div id="cardGrid" class="card-grid">
        <p class="empty-state">Loading cards…</p>
      </div>
    </section>

  </main>

  <!-- CART -->
  <div id="cartOverlay" class="cart-overlay"></div>
  <aside id="cartDrawer" class="cart-drawer" aria-hidden="true" aria-labelledby="cart-title">
    <div class="cart-drawer-header">
      <h2 id="cart-title">Your cart</h2>
      <button type="button" id="closeCartBtn" class="cart-close-btn" aria-label="Close cart">✕</button>
    </div>

    <div id="cartItems" class="cart-items">
      <p class="empty-state">Your cart is empty.</p>
    </div>

    <div class="cart-drawer-footer">
      <div class="cart-total-row">
        <span>Total</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <button type="button" id="checkoutBtn" class="checkout-btn" disabled>Checkout</button>
      <p id="cartMessage" class="form-message" role="status"></p>
    </div>
  </aside>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="script.js"></script>
</body>

</html>
