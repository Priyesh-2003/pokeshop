<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéShop — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --text:      #f0ece3;
      --muted:     #888;
      --accent:    #e8b84b;
      --accent-dim:#b88e30;
      --error:     #e05c5c;
      --success:   #5cba7d;
      --fire:      #f97316;
      --water:     #3b82f6;
      --electric:  #eab308;
      --grass:     #22c55e;
      --psychic:   #a855f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .login-wrap { width: 100%; max-width: 420px; }

    .brand { text-align: center; margin-bottom: 2.5rem; }
    .brand .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .brand h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.8rem;
      line-height: 1;
      color: var(--text);
    }
    .brand h1 .accent { color: var(--accent); }

    .type-strip {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 1rem;
    }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; }
    .field label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field input::placeholder { color: #444; }
    .field input:focus { border-color: var(--accent); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover  { background: var(--accent-dim); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .register-btn {
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.15s, transform 0.1s;
    }
    .register-btn:hover  { background: rgba(232,184,75,0.08); }
    .register-btn:active { transform: scale(0.98); }

    .message {
      font-size: 0.82rem;
      margin-top: 1rem;
      min-height: 1.2em;
      text-align: center;
    }
    .message.error   { color: var(--error); }
    .message.success { color: var(--success); }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="brand">
      <p class="eyebrow">Inventory</p>
      <h1>Poké<span class="accent">Shop</span></h1>
      <div class="type-strip">
        <div class="type-dot" style="background:var(--fire)"></div>
        <div class="type-dot" style="background:var(--water)"></div>
        <div class="type-dot" style="background:var(--electric)"></div>
        <div class="type-dot" style="background:var(--grass)"></div>
        <div class="type-dot" style="background:var(--psychic)"></div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">Sign in to continue</p>
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="button" id="registerBtn" class="register-btn">Login</button>
        <button type="submit" id="submitBtn" class="submit-btn"> Register</button>
       
        <p id="message" class="message" role="status"></p>
      </form>
    </div>

  </div>

  <script src="loginScript.js"></script>
</body>
</html>
